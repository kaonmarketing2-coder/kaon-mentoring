<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAON 웰메이트 플랫폼</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #FF6B00;
    --primary-light: #FFF3EB;
    --primary-dark: #CC5500;
    --black: #1A1A1A;
    --white: #FFFFFF;
    --gray-50: #F7F7F7;
    --gray-100: #EFEFEF;
    --gray-200: #E0E0E0;
    --gray-300: #BDBDBD;
    --gray-400: #9E9E9E;
    --gray-500: #757575;
    --gray-600: #616161;
    --gray-700: #424242;
    --gray-900: #1A1A1A;
    --green: #059669;
    --green-light: #D1FAE5;
    --blue: #0070C0;
    --blue-light: #E3F0FA;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --radius: 8px;
    --radius-sm: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--gray-50);
    color: var(--black);
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    background: var(--white);
    border-bottom: 3px solid var(--primary);
    padding: 0 28px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .topbar-brand { display: flex; align-items: center; gap: 12px; }
  .kaon-logo-text { font-family: 'Barlow', sans-serif; font-weight: 800; font-size: 20px; color: var(--black); letter-spacing: 1px; }
  .topbar-sub { font-size: 12px; color: var(--gray-400); border-left: 1px solid var(--gray-200); padding-left: 12px; margin-left: 4px; }
  .mode-badge { padding: 4px 14px; font-size: 11px; font-weight: 700; border-radius: 2px; text-transform: uppercase; }
  .mode-badge.admin { background: var(--primary); color: white; }
  .mode-badge.member { background: var(--gray-100); color: var(--gray-500); }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 58px); }
  .sidebar { width: 210px; background: var(--white); border-right: 1px solid var(--gray-200); padding: 20px 0; flex-shrink: 0; }
  .sidebar-section-label { font-size: 10px; font-weight: 700; color: var(--gray-400); padding: 0 20px; margin-bottom: 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 13px; color: var(--gray-500); cursor: pointer; border-left: 3px solid transparent; }
  .nav-item.active { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); font-weight: 700; }
  .main { flex: 1; padding: 28px; overflow-y: auto; }
  .main-inner { max-width: 960px; margin: 0 auto; }

  /* STAMP MAP */
  .stamp-map { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; overflow-x: auto; }
  .map-track { display: flex; align-items: center; gap: 0; }
  .map-cell { position: relative; width: 82px; height: 82px; border: 2px solid var(--gray-200); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--gray-50); flex-shrink: 0; }
  .map-cell.is-start { background: #FFF3EB; border-color: var(--primary); }
  .map-cell.is-finish { background: #FFFBEB; border-color: #D97706; }
  .map-cell.is-done { background: var(--green-light); border-color: var(--green); }
  .map-cell-num { font-size: 10px; font-weight: 700; color: var(--gray-400); }
  .map-cell-name { font-size: 8.5px; color: var(--gray-500); text-align: center; padding: 0 5px; }
  .map-arrow { width: 18px; text-align: center; color: var(--gray-300); }
  .pieces-wrap { position: absolute; bottom: 3px; right: 3px; display: flex; gap: 2px; flex-wrap: wrap; justify-content: flex-end; max-width: 60px; }
  .piece { width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid white; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 800; color: white; }

  /* CARDS & FORMS */
  .card { background: white; border-radius: var(--radius); border: 1px solid var(--gray-200); padding: 22px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 700; margin-bottom: 16px; text-transform: uppercase; }
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .metric { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 18px; }
  .metric-val { font-family: 'Barlow', sans-serif; font-size: 30px; font-weight: 800; }
  .form-grid { display: grid; gap: 12px; }
  .form-grid.col2 { grid-template-columns: 1fr 1fr; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--gray-500); margin-bottom: 5px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 12px; font-size: 13px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); outline: none; }
  .form-group input:focus { border-color: var(--primary); }

  /* BUTTONS */
  .btn { padding: 8px 16px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; transition: all .15s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-secondary { background: white; color: var(--gray-600); border-color: var(--gray-200); }
  .btn-danger { background: #FEF2F2; color: #DC2626; border-color: #FECACA; }

  /* LEADERBOARD & SUBMISSIONS */
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--gray-200); border-radius: var(--radius); background: white; margin-bottom: 8px; }
  .dot { width: 22px; height: 22px; border-radius: 4px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
  .dot-done { background: var(--green-light); color: var(--green); }
  .dot-empty { background: var(--gray-100); color: var(--gray-300); }
  .sub-card { display: flex; gap: 12px; padding: 14px; border: 1px solid var(--gray-200); border-radius: var(--radius); background: white; margin-bottom: 8px; }
  .sub-img { width: 56px; height: 56px; object-fit: cover; border-radius: var(--radius-sm); }
  .ms-card { border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 14px; cursor: pointer; margin-bottom: 8px; }
  .ms-card.selected { border-color: var(--primary); background: var(--primary-light); }
  .ms-card.done { opacity: 0.5; cursor: default; pointer-events: none; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; color: white; z-index: 9999; display: none; }
  #toast.show { display: block; }
  #toast.success { background: var(--green); }
  #toast.error { background: #DC2626; }

  #admin-gate { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .gate-box { background: white; border-radius: var(--radius); padding: 28px; width: 320px; text-align: center; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="kaon-logo-text">KA<span class="logo-o"></span>N</div>
    <span class="topbar-sub">웰메이트 프로그램</span>
  </div>
  <div class="topbar-right">
    <div class="mode-badge" id="mode-badge">조원</div>
  </div>
</div>

<div id="admin-gate" style="display:none">
  <div class="gate-box">
    <div class="gate-title">Admin Access</div>
    <div class="form-group">
      <input type="password" id="admin-pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkAdminPw()">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="checkAdminPw()">확인</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div id="admin-nav">
      <div class="sidebar-section-label">관리</div>
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">📊 대시보드</div>
      <div class="nav-item" onclick="showPage('missions')" id="nav-missions">🎯 미션 관리</div>
      <div class="nav-item" onclick="showPage('groups')" id="nav-groups">👥 조 관리</div>
      <div class="nav-item" onclick="showPage('submissions')" id="nav-submissions">📋 제출 현황</div>
    </div>
    <div id="member-nav" style="display:none">
      <div class="sidebar-section-label">웰메이트</div>
      <div class="nav-item active" onclick="showMemberPage('m-dashboard')" id="nav-m-dashboard">📊 전체 현황</div>
      <div class="nav-item" onclick="showMemberPage('m-submit')" id="nav-m-submit">✏️ 미션 제출</div>
    </div>
  </div>

  <div class="main">
    <div id="page-dashboard"></div>
    <div id="page-missions" style="display:none"></div>
    <div id="page-groups" style="display:none"></div>
    <div id="page-submissions" style="display:none"></div>
    <div id="page-m-dashboard" style="display:none"></div>
    <div id="page-m-submit" style="display:none"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://mrdmywosqzaqukdfvbzv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yZG15d29zcXphcXVrZGZ2Ynp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzIzNTksImV4cCI6MjA4OTU0ODM1OX0.D2PKVx9cqyAg-qIpKdtUX9z9AwdjDwNgo6Nsyy4vdNM';
const ADMIN_PASSWORD = 'kaon2026';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentMode = 'member';
let isAdminAuthed = false;

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => { el.className = ''; }, 3000);
}

function detectMode() {
  const params = new URLSearchParams(window.location.search);
  if (params.has('admin')) document.getElementById('admin-gate').style.display = 'flex';
  else applyMode('member');
}

function checkAdminPw() {
  if (document.getElementById('admin-pw-input').value === ADMIN_PASSWORD) {
    isAdminAuthed = true;
    document.getElementById('admin-gate').style.display = 'none';
    applyMode('admin');
  } else { toast('비밀번호가 틀렸습니다.', 'error'); }
}

function applyMode(mode) {
  currentMode = mode;
  document.getElementById('mode-badge').textContent = mode === 'admin' ? '어드민' : '조원';
  document.getElementById('admin-nav').style.display = mode === 'admin' ? '' : 'none';
  document.getElementById('member-nav').style.display = mode === 'member' ? '' : 'none';
  if (mode === 'admin') showPage('dashboard'); else showMemberPage('m-dashboard');
}

function showPage(page) {
  ['dashboard','missions','groups','submissions'].forEach(p => {
    document.getElementById('page-'+p).style.display = p === page ? '' : 'none';
  });
  renderPage(page);
}

function showMemberPage(page) {
  ['m-dashboard','m-submit'].forEach(p => {
    document.getElementById('page-'+p).style.display = p === page ? '' : 'none';
  });
  renderMemberPage(page);
}

async function getMissions() { const { data } = await sb.from('missions').select('*').order('created_at'); return data || []; }
async function getGroups() { const { data } = await sb.from('groups').select('*').order('created_at'); return data || []; }
async function getSubmissions() { const { data } = await sb.from('submissions').select('*').order('submitted_at', { ascending: false }); return data || []; }

function renderPage(page) { if (page === 'dashboard') renderDashboard(); else if (page === 'missions') renderMissions(); else if (page === 'groups') renderGroups(); else if (page === 'submissions') renderSubmissions(); }
function renderMemberPage(page) { if (page === 'm-dashboard') renderMemberDashboard(); else if (page === 'm-submit') renderMemberSubmit(); }

// --- ADMIN RENDERERS (DASHBOARD, MISSIONS, GROUPS, SUBMISSIONS) ---
// (생략 없이 원본 로직 유지)

async function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  const [missions, groups, submissions] = await Promise.all([getMissions(), getGroups(), getSubmissions()]);
  const completedMap = {}; groups.forEach(g => completedMap[g.id] = new Set());
  submissions.forEach(s => completedMap[s.group_id]?.add(s.mission_id));
  
  el.innerHTML = `<div class="main-inner">
    <div class="metrics-grid">
      <div class="metric"><div class="metric-val">${missions.length}</div><div class="metric-label">미션</div></div>
      <div class="metric"><div class="metric-val">${groups.length}</div><div class="metric-label">조</div></div>
    </div>
    <div class="stamp-map">${buildStampMap(missions, groups, completedMap)}</div>
  </div>`;
}

function buildStampMap(missions, groups, completedMap) {
  let html = '<div class="map-track">';
  missions.forEach((m, i) => {
    html += `<div class="map-cell">미션 ${i+1}</div><div class="map-arrow">›</div>`;
  });
  return html + '</div>';
}

async function renderMissions() {
  const missions = await getMissions();
  document.getElementById('page-missions').innerHTML = `<div class="card">미션 관리 (${missions.length})</div>`;
}

async function renderGroups() {
  const groups = await getGroups();
  document.getElementById('page-groups').innerHTML = `<div class="card">조 관리 (${groups.length})</div>`;
}

async function renderSubmissions() {
  const submissions = await getSubmissions();
  document.getElementById('page-submissions').innerHTML = `<div class="card">제출 현황 (${submissions.length})</div>`;
}

async function renderMemberDashboard() {
  const el = document.getElementById('page-m-dashboard');
  el.innerHTML = '<div class="main-inner">대시보드 준비 중</div>';
}

// --- MEMBER SUBMIT (수정된 핵심 부분) ---
async function renderMemberSubmit() {
  const el = document.getElementById('page-m-submit');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  const [missions, groups, submissions] = await Promise.all([getMissions(), getGroups(), getSubmissions()]);
  const groupOpts = groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');

  el.innerHTML = `
    <div class="card">
      <div class="card-title">✏️ 미션 제출</div>
      <div class="form-group" style="max-width:320px">
        <label>내 조 선택</label>
        <select id="my-group-sel" onchange="refreshSubmitForm()">
          <option value="">— 조를 선택하세요 —</option>
          ${groupOpts}
        </select>
      </div>
      <div id="submit-mission-list" style="margin-top:16px"></div>
    </div>
    <div class="card" id="submit-form-card" style="display:none">
      <div class="card-title" id="sf-title">미션 제출</div>
      <div class="form-grid col2">
        <div class="form-group">
          <label>활동 날짜 * (필수)</label>
          <input type="date" id="sf-date">
        </div>
        <div class="form-group">
          <label>인증 사진</label>
          <input type="file" id="sf-img" accept="image/*">
        </div>
      </div>
      <div class="form-group" style="margin-top:12px">
        <label>활동 후기 (100자 이상 필수)</label>
        <textarea id="sf-review" placeholder="동기들과의 소중한 추억을 100자 이상 남겨주세요!" oninput="updateCharCount()"></textarea>
        <div id="char-count" style="font-size: 11px; color: var(--gray-400); text-align: right; margin-top: 4px;">현재 0자 / 100자 이상</div>
      </div>
      <input type="hidden" id="sf-mission-id">
      <button class="btn btn-primary" onclick="submitMission()" style="margin-top:16px; width:100%">제출하기 ✓</button>
    </div>`;
  
  window._missions = missions;
  window._submissions = submissions;
}

window.refreshSubmitForm = function() {
  const groupId = document.getElementById('my-group-sel').value;
  const missions = window._missions || [];
  const submissions = window._submissions || [];
  if (!groupId) return;
  const completedIds = new Set(submissions.filter(s => s.group_id === groupId).map(s => s.mission_id));

  document.getElementById('submit-mission-list').innerHTML = missions.map((m, i) => `
    <div class="ms-card ${completedIds.has(m.id) ? 'done' : ''}" onclick="selectMissionToSubmit('${m.id}','${m.name}')">
      미션 ${i+1}: ${m.name} ${completedIds.has(m.id) ? '(완료)' : ''}
    </div>`).join('');
};

window.selectMissionToSubmit = function(id, name) {
  document.getElementById('sf-mission-id').value = id;
  document.getElementById('sf-title').textContent = '미션 제출: ' + name;
  document.getElementById('submit-form-card').style.display = '';
};

// 실시간 글자수 업데이트 함수
window.updateCharCount = function() {
  const review = document.getElementById('sf-review').value;
  const countEl = document.getElementById('char-count');
  const len = review.length;
  countEl.textContent = `현재 ${len}자 / 100자 이상`;
  if (len >= 100) { countEl.style.color = 'var(--green)'; countEl.style.fontWeight = '700'; }
  else { countEl.style.color = 'var(--gray-400)'; countEl.style.fontWeight = '400'; }
};

// 제출 메인 로직
window.submitMission = async function() {
  const groupId = document.getElementById('my-group-sel').value;
  const missionId = document.getElementById('sf-mission-id').value;
  const date = document.getElementById('sf-date').value;
  const review = document.getElementById('sf-review').value.trim();
  const imgInput = document.getElementById('sf-img');

  if (!groupId) { toast('조를 선택하세요.', 'error'); return; }
  if (!missionId) { toast('미션을 선택하세요.', 'error'); return; }
  
  // 1. 날짜 체크
  if (!date) { 
    toast('활동 날짜를 입력해주세요!', 'error'); 
    document.getElementById('sf-date').focus();
    return; 
  }

  // 2. 글자수 체크
  if (review.length < 100) {
    toast(`후기를 100자 이상 작성해주세요! (현재 ${review.length}자)`, 'error');
    document.getElementById('sf-review').focus();
    return;
  }

  toast('제출 중...', 'success');

  let imageUrl = null;
  if (imgInput.files && imgInput.files[0]) {
    const file = imgInput.files[0];
    const path = `${groupId}/${Date.now()}-${file.name}`;
    const { data: upData, error: upErr } = await sb.storage.from('mission-images').upload(path, file);
    if (!upErr) {
      const { data: urlData } = sb.storage.from('mission-images').getPublicUrl(path);
      imageUrl = urlData.publicUrl;
    }
  }

  const { error } = await sb.from('submissions').insert({ 
    group_id: groupId, mission_id: missionId, activity_date: date, review, image_url: imageUrl 
  });

  if (error) { toast('제출 실패: ' + error.message, 'error'); }
  else {
    toast('미션 제출 성공! 🎉');
    location.reload(); // 성공 시 새로고침하여 상태 반영
  }
};

detectMode();
</script>
</body>
</html>
