<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAON 웰메이트 플랫폼</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* KAON CI 공식 컬러 */
    --primary: #FF6B00;       /* KAON 오렌지 */
    --primary-light: #FFF3EB;
    --primary-dark: #CC5500;
    --black: #1A1A1A;         /* KAON 블랙 */
    --white: #FFFFFF;
    --gray-50: #F7F7F7;
    --gray-100: #EFEFEF;
    --gray-200: #E0E0E0;
    --gray-300: #BDBDBD;
    --gray-400: #9E9E9E;
    --gray-500: #757575;
    --gray-600: #616161;
    --gray-700: #424242;
    --gray-900: #1A1A1A;
    --green: #059669;
    --green-light: #D1FAE5;
    --blue: #0070C0;
    --blue-light: #E3F0FA;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --radius: 8px;
    --radius-sm: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--gray-50);
    color: var(--black);
    min-height: 100vh;
  }

  /* TOPBAR — KAON CI: 흰 배경 + 오렌지 하단 라인 */
  .topbar {
    background: var(--white);
    border-bottom: 3px solid var(--primary);
    padding: 0 28px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .topbar-brand { display: flex; align-items: center; gap: 12px; }

  /* KAON 로고 SVG (파워버튼 O) */
  .topbar-logo-wrap { display: flex; align-items: center; gap: 8px; }
  .kaon-logo-text {
    font-family: 'Barlow', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--black);
    letter-spacing: 1px;
    line-height: 1;
  }
  .kaon-logo-text .logo-o {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2.5px solid var(--primary);
    border-radius: 50%;
    position: relative;
    vertical-align: middle;
    margin: 0 0px;
  }
  .kaon-logo-text .logo-o::after {
    content: '';
    position: absolute;
    top: -5px; left: 50%; transform: translateX(-50%);
    width: 2.5px; height: 8px;
    background: var(--primary);
    border-radius: 2px;
  }
  .topbar-sub {
    font-size: 12px;
    font-weight: 400;
    color: var(--gray-400);
    border-left: 1px solid var(--gray-200);
    padding-left: 12px;
    margin-left: 4px;
  }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .mode-badge { padding: 4px 14px; font-size: 11px; font-weight: 700; border-radius: 2px; letter-spacing: 0.5px; text-transform: uppercase; }
  .mode-badge.admin { background: var(--primary); color: white; }
  .mode-badge.member { background: var(--gray-100); color: var(--gray-500); }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 58px); }
  .sidebar {
    width: 210px;
    background: var(--white);
    border-right: 1px solid var(--gray-200);
    padding: 20px 0;
    flex-shrink: 0;
  }
  .sidebar-section-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--gray-400);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 0 20px;
    margin-bottom: 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; font-size: 13px; font-weight: 500;
    color: var(--gray-500); cursor: pointer; transition: all .15s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: var(--gray-50); color: var(--black); }
  .nav-item.active { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); font-weight: 700; }
  .nav-icon { font-size: 14px; width: 18px; text-align: center; }
  .main { flex: 1; padding: 28px; overflow-y: auto; }
  .main-inner { max-width: 960px; margin: 0 auto; }

  /* 보드게임 맵 */
  .stamp-map { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; overflow-x: auto; }
  .stamp-map-title { font-size: 13px; font-weight: 700; color: var(--black); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
  .map-track { display: flex; align-items: center; flex-wrap: nowrap; gap: 0; }
  .map-cell { position: relative; width: 82px; height: 82px; border: 2px solid var(--gray-200); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--gray-50); flex-shrink: 0; }
  .map-cell.is-start { background: #FFF3EB; border-color: var(--primary); }
  .map-cell.is-finish { background: #FFFBEB; border-color: #D97706; }
  .map-cell.is-done { background: var(--green-light); border-color: var(--green); }
  .map-cell-num { font-size: 10px; font-weight: 700; color: var(--gray-400); margin-bottom: 2px; }
  .map-cell-name { font-size: 8.5px; color: var(--gray-500); text-align: center; padding: 0 5px; line-height: 1.3; word-break: keep-all; }
  .map-cell.is-done .map-cell-num { color: var(--green); }
  .map-cell.is-done .map-cell-name { color: var(--green); font-weight: 600; }
  .map-cell.is-finish .map-cell-num { color: #D97706; }
  .map-arrow { display: flex; align-items: center; justify-content: center; width: 18px; height: 82px; flex-shrink: 0; color: var(--gray-300); font-size: 13px; }
  .pieces-wrap { position: absolute; bottom: 3px; right: 3px; display: flex; gap: 2px; flex-wrap: wrap; justify-content: flex-end; max-width: 60px; }
  .piece { width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid white; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 800; color: white; }

  /* 순위 카드 */
  .rank-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .rank-card { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .rank-card.r1 { border-color: #FCD34D; background: #FFFBEB; }
  .rank-badge { font-size: 22px; flex-shrink: 0; line-height: 1; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .rank-stamp { font-size: 12px; color: var(--primary); font-weight: 600; }
  .rank-dots { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 5px; }

  /* CARDS */
  .card { background: white; border-radius: var(--radius); border: 1px solid var(--gray-200); padding: 22px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--black); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-title-icon { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; }

  /* METRICS */
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .metric { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 18px; }
  .metric-val { font-family: 'Barlow', sans-serif; font-size: 30px; font-weight: 800; color: var(--black); line-height: 1; margin-bottom: 5px; }
  .metric-label { font-size: 11px; font-weight: 500; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; }
  .metric-accent { border-top: 3px solid var(--primary); }

  /* FORMS */
  .form-grid { display: grid; gap: 12px; }
  .form-grid.col2 { grid-template-columns: 1fr 1fr; }
  .form-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--gray-500); margin-bottom: 5px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 8px 12px; font-size: 13px; border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm); background: white; color: var(--gray-900);
    font-family: inherit; outline: none; transition: border .15s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); }
  .form-group textarea { resize: vertical; min-height: 72px; }

  /* BUTTONS */
  .btn { padding: 8px 16px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; font-family: inherit; transition: all .15s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: #e05f00; }
  .btn-secondary { background: white; color: var(--gray-600); border-color: var(--gray-200); }
  .btn-secondary:hover { background: var(--gray-50); }
  .btn-danger { background: #FEF2F2; color: #DC2626; border-color: #FECACA; }
  .btn-danger:hover { background: #FEE2E2; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-success { background: var(--green-light); color: var(--green); border-color: #A7F3D0; }

  /* MISSION CARDS */
  .mission-list { display: flex; flex-direction: column; gap: 8px; }
  .mission-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border: 1px solid var(--gray-200); border-radius: var(--radius); background: white; }
  .mission-num { width: 30px; height: 30px; border-radius: 50%; background: var(--primary-light); color: var(--primary); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .mission-body { flex: 1; min-width: 0; }
  .mission-name { font-size: 13px; font-weight: 600; color: var(--gray-900); margin-bottom: 3px; }
  .mission-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .mission-desc { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-blue { background: var(--primary-light); color: var(--primary); }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-orange { background: var(--primary-light); color: var(--primary); }
  .badge-gray { background: var(--gray-100); color: var(--gray-500); }

  /* LEADERBOARD */
  .lb-list { display: flex; flex-direction: column; gap: 8px; }
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--gray-200); border-radius: var(--radius); background: white; }
  .lb-row.top1 { border-color: #FCD34D; background: #FFFBEB; }
  .lb-row.top2 { border-color: var(--gray-300); background: var(--gray-50); }
  .lb-rank { font-size: 13px; font-weight: 700; width: 28px; text-align: center; flex-shrink: 0; }
  .lb-rank.r1 { color: #D97706; }
  .lb-rank.r2 { color: #94A3B8; }
  .lb-name { font-size: 13px; font-weight: 600; flex: 1; }
  .lb-dots { display: flex; gap: 4px; flex-wrap: wrap; }
  .dot { width: 22px; height: 22px; border-radius: 4px; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .dot-done { background: var(--green-light); color: var(--green); }
  .dot-empty { background: var(--gray-100); color: var(--gray-300); }
  .lb-bar-wrap { width: 100px; background: var(--gray-100); border-radius: 20px; height: 7px; overflow: hidden; }
  .lb-bar { height: 7px; border-radius: 20px; background: var(--primary); transition: width .4s; }
  .lb-stamp { font-size: 12px; font-weight: 600; color: var(--gray-600); white-space: nowrap; }

  /* GROUP CHIPS */
  .group-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .group-chip { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border: 1px solid var(--gray-200); border-radius: 20px; font-size: 13px; background: white; }
  .chip-del { cursor: pointer; color: var(--gray-400); font-size: 16px; line-height: 1; padding: 0 2px; }
  .chip-del:hover { color: #DC2626; }

  /* SUBMISSIONS */
  .sub-card { display: flex; gap: 12px; padding: 14px; border: 1px solid var(--gray-200); border-radius: var(--radius); background: white; margin-bottom: 8px; }
  .sub-card.rejected { border-left: 4px solid #DC2626; background: #FFF8F8; }
  .sub-card.approved { border-left: 4px solid var(--green); }
  .badge-pending  { background: #FFF3EB; color: var(--primary); }
  .badge-approved { background: var(--green-light); color: var(--green); }
  .badge-rejected { background: #FEF2F2; color: #DC2626; }
  .reject-reason-box { background: #FEF2F2; border: 1px solid #FECACA; border-radius: var(--radius-sm); padding: 8px 12px; margin-top:8px; font-size:12px; color:#DC2626; }
  .reject-modal-bg { position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:999; }
  .reject-modal { background:white;border-radius:var(--radius);padding:24px;width:420px;max-width:90vw; }
  .reject-modal-title { font-size:15px;font-weight:700;margin-bottom:12px; }
  .reject-modal-sub { font-size:12px;color:var(--gray-500);margin-bottom:12px; }
  .sub-img { width: 56px; height: 56px; object-fit: cover; border-radius: var(--radius-sm); flex-shrink: 0; border: 1px solid var(--gray-200); }
  .sub-img-empty { width: 56px; height: 56px; background: var(--gray-100); border-radius: var(--radius-sm); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--gray-400); text-align: center; }
  .sub-body { flex: 1; min-width: 0; }

  /* MEMBER SUBMIT */
  .ms-card { border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all .15s; margin-bottom: 8px; }
  .ms-card:hover { border-color: var(--primary); }
  .ms-card.selected { border-color: var(--primary); background: var(--primary-light); }
  .ms-card.done { opacity: 0.5; cursor: default; pointer-events: none; }
  .img-upload-box { width: 64px; height: 64px; border: 1.5px dashed var(--gray-300); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; color: var(--gray-400); flex-shrink: 0; }
  .img-upload-box:hover { border-color: var(--primary); color: var(--primary); }
  .file-upload-area { border: 1.5px dashed var(--gray-300); border-radius: var(--radius-sm); padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; background: var(--gray-50); transition: all .15s; }
  .file-upload-area:hover { border-color: var(--primary); background: var(--primary-light); }
  .file-upload-icon { font-size: 20px; flex-shrink: 0; }
  .file-upload-text { font-size: 12px; color: var(--gray-500); }
  .file-upload-text span { font-weight: 600; color: var(--primary); }
  .file-attached { background: var(--green-light); border-color: var(--green); }
  .file-attached .file-upload-text { color: var(--green); }
  .preview-img { width: 64px; height: 64px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--gray-200); }

  /* MATRIX */
  .matrix-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .matrix-label { font-size: 12px; font-weight: 500; width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
  .matrix-bar-wrap { flex: 1; background: var(--gray-100); border-radius: 20px; height: 8px; overflow: hidden; }
  .matrix-bar { height: 8px; border-radius: 20px; background: var(--blue); }
  .matrix-count { font-size: 12px; color: var(--gray-400); width: 60px; text-align: right; flex-shrink: 0; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; color: white; z-index: 9999; display: none; }
  #toast.show { display: block; }
  #toast.success { background: var(--green); }
  #toast.error { background: #DC2626; }

  /* LOADING */
  .loading { text-align: center; padding: 40px; color: var(--gray-400); font-size: 13px; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px; color: var(--gray-400); font-size: 13px; }

  /* DIVIDER */
  .divider { height: 1px; background: var(--gray-200); margin: 16px 0; }

  /* ADMIN PASS */
  #admin-gate { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .gate-box { background: white; border-radius: var(--radius); padding: 28px; width: 320px; text-align: center; }
  .gate-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .gate-sub { font-size: 12px; color: var(--gray-400); margin-bottom: 18px; }

  @media (max-width: 768px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .sidebar { display: none; }
    .form-grid.col3 { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<script>
const SUPABASE_URL = 'https://mrdmywosqzaqukdfvbzv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yZG15d29zcXphcXVrZGZ2Ynp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzIzNTksImV4cCI6MjA4OTU0ODM1OX0.D2PKVx9cqyAg-qIpKdtUX9z9AwdjDwNgo6Nsyy4vdNM';
const ADMIN_PASSWORD = 'kaon2026';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentMode = 'member';
let currentPage = 'dashboard';
let currentMemberPage = 'm-dashboard';
let isAdminAuthed = false;

// ── TOAST ──
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => { el.className = ''; }, 3000);
}

// ── URL 기반 모드 감지 ──
function detectMode() {
  const params = new URLSearchParams(window.location.search);
  if (params.has('admin')) {
    document.getElementById('admin-gate').style.display = 'flex';
    setTimeout(() => document.getElementById('admin-pw-input').focus(), 100);
  } else {
    applyMode('member');
  }
}

function checkAdminPw() {
  const pw = document.getElementById('admin-pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    isAdminAuthed = true;
    document.getElementById('admin-gate').style.display = 'none';
    document.getElementById('admin-pw-input').value = '';
    applyMode('admin');
  } else {
    toast('비밀번호가 틀렸습니다.', 'error');
    document.getElementById('admin-pw-input').value = '';
    document.getElementById('admin-pw-input').focus();
  }
}

function applyMode(mode) {
  currentMode = mode;
  const badge = document.getElementById('mode-badge');
  if (mode === 'admin') {
    badge.textContent = '어드민';
    badge.className = 'mode-badge admin';
  } else {
    badge.textContent = '조원';
    badge.className = 'mode-badge member';
  }
  document.getElementById('admin-nav').style.display = mode === 'admin' ? '' : 'none';
  document.getElementById('member-nav').style.display = mode === 'member' ? '' : 'none';
  ['dashboard','missions','groups','submissions'].forEach(p => document.getElementById('page-'+p).style.display = 'none');
  ['m-dashboard','m-submit'].forEach(p => document.getElementById('page-'+p).style.display = 'none');
  if (mode === 'admin') showPage('dashboard');
  else showMemberPage('m-dashboard');
}

// ── 보드게임 스탬프 맵 생성 ──
function buildStampMap(missions, groups, completedMap, stampsMap) {
  if (missions.length === 0) return '<div class="empty" style="padding:20px">미션이 등록되지 않았습니다.</div>';

  const PIECE_COLORS = ['#FF6B00','#0070C0','#059669','#7C3AED','#DC2626','#D97706','#0891B2','#BE185D','#0F766E','#9D174D','#92400E','#1D4ED8'];

  const posMap = {};
  groups.forEach(g => { posMap[g.id] = (completedMap[g.id] || new Set()).size; });
  const piecesByCell = {};
  groups.forEach((g, gi) => {
    const pos = Math.min(posMap[g.id] || 0, missions.length);
    if (!piecesByCell[pos]) piecesByCell[pos] = [];
    piecesByCell[pos].push({ name: g.name, color: PIECE_COLORS[gi % PIECE_COLORS.length], initial: g.name.charAt(0) });
  });

  const nodes = [
    { type: 'start', label: 'START' },
    ...missions.map((m, i) => ({ type: 'mission', label: `미션 ${i+1}`, id: m.id })),
    { type: 'finish', label: 'FINISH' }
  ];
  const N = nodes.length;

  // ── 미션 수에 따라 한 줄 개수 자동 결정 ──
  // 총 노드 수 N에 따라 COL 결정: 화면에 자연스럽게 맞도록
  const COL = N <= 6 ? N : N <= 12 ? Math.ceil(N / 2) : N <= 20 ? Math.ceil(N / 3) : N <= 30 ? Math.ceil(N / 4) : Math.ceil(N / 5);

  const R = 21;         // 노드 반지름
  const HGAP = 75;      // 수평 간격 (노드 중심 간)
  const VGAP = 85;      // 수직 간격 (행 간)
  const PX = 45, PY = 45;

  const rows = Math.ceil(N / COL);
  const rowCounts = [];
  for (let r = 0; r < rows; r++) rowCounts.push(Math.min(COL, N - r * COL));
  const maxCols = Math.max(...rowCounts);

  const svgW = PX * 2 + (maxCols - 1) * HGAP;
  const svgH = PY * 2 + (rows - 1) * VGAP + 40; // 40: 라벨 여백

  // 좌표 계산 (지그재그)
  const coords = [];
  for (let i = 0; i < N; i++) {
    const row = Math.floor(i / COL);
    const rowStart = row * COL;
    const rowCount = rowCounts[row];
    const colInRow = i - rowStart;
    const isEvenRow = row % 2 === 0;
    const actualCol = isEvenRow ? colInRow : (rowCount - 1 - colInRow);
    coords.push({ x: PX + actualCol * HGAP, y: PY + 20 + row * VGAP });
  }

  // ── 경로선 ──
  let pathsSVG = '';
  for (let i = 0; i < N - 1; i++) {
    const a = coords[i], b = coords[i + 1];
    const rowA = Math.floor(i / COL), rowB = Math.floor((i + 1) / COL);
    const nodeB = nodes[i + 1];
    const someDone = nodeB.type === 'finish'
      ? groups.some(g => posMap[g.id] >= missions.length)
      : nodeB.type === 'mission' && groups.some(g => (completedMap[g.id]||new Set()).has(nodeB.id));
    const allDone = nodeB.type === 'finish'
      ? groups.length > 0 && groups.every(g => posMap[g.id] >= missions.length)
      : nodeB.type === 'mission' && groups.length > 0 && groups.every(g => (completedMap[g.id]||new Set()).has(nodeB.id));

    let pathD;
    if (rowA === rowB) {
      const dir = b.x > a.x ? 1 : -1;
      pathD = `M ${a.x + dir*R} ${a.y} L ${b.x - dir*R} ${b.y}`;
    } else {
      // 부드러운 S자 곡선
      const ay = a.y + R, by = b.y - R;
      const midY = (ay + by) / 2;
      pathD = `M ${a.x} ${ay} C ${a.x} ${midY} ${b.x} ${midY} ${b.x} ${by}`;
    }

    pathsSVG += `<path d="${pathD}" fill="none" stroke="#E2E8F0" stroke-width="4.5" stroke-linecap="round"/>`;
    pathsSVG += `<path d="${pathD}" fill="none" stroke="#CBD5E1" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="9 7" opacity="0.5"/>`;
    if (someDone) {
      pathsSVG += `<path d="${pathD}" fill="none" stroke="${allDone ? '#059669' : '#34D399'}" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>`;
    }
  }

  // ── 화살표 ──
  let arrowsSVG = '';
  for (let i = 0; i < N - 1; i++) {
    const a = coords[i], b = coords[i + 1];
    const rowA = Math.floor(i / COL), rowB = Math.floor((i + 1) / COL);
    if (rowA === rowB) {
      const mx = (a.x + b.x) / 2, my = a.y;
      const dir = b.x > a.x ? 1 : -1;
      arrowsSVG += `<polygon points="${mx},${my-5} ${mx+dir*8},${my} ${mx},${my+5}" fill="#94A3B8" opacity="0.8"/>`;
    }
  }

  // ── 노드 ──
  let nodesSVG = '';
  nodes.forEach((node, i) => {
    const { x, y } = coords[i];
    const pieces = piecesByCell[i] || [];
    // 짝수 인덱스: 라벨 위, 홀수: 라벨 아래
    const labelAbove = i % 2 === 0;
    const labelY = labelAbove ? y - R - 10 : y + R + 16;

    let fill, stroke, iconText, iconSize, labelFill;
    if (node.type === 'start') {
      fill = '#FF6B00'; stroke = '#CC5500'; iconText = '🚀'; iconSize = 14; labelFill = '#CC5500';
    } else if (node.type === 'finish') {
      fill = '#D97706'; stroke = '#B45309'; iconText = '🏆'; iconSize = 14; labelFill = '#B45309';
    } else {
      const mId = node.id;
      const allDone = groups.length > 0 && groups.every(g => (completedMap[g.id]||new Set()).has(mId));
      const someDone = groups.some(g => (completedMap[g.id]||new Set()).has(mId));
      if (allDone)       { fill='#059669'; stroke='#047857'; iconText='✓'; iconSize=13; labelFill='#047857'; }
      else if (someDone) { fill='#FFF3EB'; stroke='#FF6B00'; iconText='';  iconSize=0;  labelFill='#FF6B00'; }
      else               { fill='#F1F5F9'; stroke='#CBD5E1'; iconText='';  iconSize=0;  labelFill='#64748B'; }
    }

    if (pieces.length > 0) {
      nodesSVG += `<circle cx="${x}" cy="${y}" r="${R+6}" fill="none" stroke="${pieces[0].color}" stroke-width="2" stroke-dasharray="5 4" opacity="0.75"/>`;
    }
    nodesSVG += `<circle cx="${x}" cy="${y}" r="${R}" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/>`;
    if (iconText) {
      nodesSVG += `<text x="${x}" y="${y+5}" text-anchor="middle" dominant-baseline="middle" font-size="${iconSize}" fill="white" font-family="sans-serif">${iconText}</text>`;
    }
    nodesSVG += `<text x="${x}" y="${labelY}" text-anchor="middle" font-size="10" font-weight="700" fill="${labelFill}" font-family="sans-serif">${node.label}</text>`;

    if (pieces.length > 0) {
      pieces.forEach((p, pi) => {
        const total = pieces.length;
        const angle = total === 1 ? -Math.PI/2 : (pi/total)*Math.PI*2 - Math.PI/2;
        const pr = R - 8;
        const px2 = total === 1 ? x : x + Math.cos(angle) * pr;
        const py2 = total === 1 ? y - R + 10 : y + Math.sin(angle) * pr;
        nodesSVG += `<circle cx="${px2}" cy="${py2}" r="8" fill="${p.color}" stroke="white" stroke-width="2"/>`;
        nodesSVG += `<text x="${px2}" y="${py2+3}" text-anchor="middle" font-size="7" font-weight="800" fill="white" font-family="sans-serif">${p.initial}</text>`;
      });
    }
  });

  const svgHTML = `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;text-align:center;">
    <svg viewBox="0 0 ${svgW} ${svgH}" width="${svgW}" height="${svgH}" style="display:inline-block;max-width:100%;">
      ${pathsSVG}${arrowsSVG}${nodesSVG}
    </svg>
  </div>`;

  let legend = '';
  if (groups.length > 0) {
    legend = `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--gray-200)">`;
    groups.forEach((g, gi) => {
      const pos = posMap[g.id] || 0;
      const color = PIECE_COLORS[gi % PIECE_COLORS.length];
      legend += `<div style="display:flex;align-items:center;gap:5px;font-size:12px">
        <div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 0 0 1.5px ${color}"></div>
        <span style="font-weight:500">${g.name}</span>
        <span style="color:var(--gray-400)">(${pos}/${missions.length} 완료)</span>
      </div>`;
    });
    legend += '</div>';
  }
  return svgHTML + legend;
}

async function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  const [missions, groups, submissions] = await Promise.all([getMissions(), getGroups(), getSubmissions()]);

  const activeGroups = groups.filter(g => submissions.some(s => s.group_id === g.id)).length;
  const stampsMap = {};
  const completedMap = {};
  groups.forEach(g => { stampsMap[g.id] = 0; completedMap[g.id] = new Set(); });
  submissions.forEach(s => {
    if (!completedMap[s.group_id]?.has(s.mission_id)) {
      completedMap[s.group_id]?.add(s.mission_id);
      const m = missions.find(x => x.id === s.mission_id);
      stampsMap[s.group_id] = (stampsMap[s.group_id] || 0) + (m?.stamp || 1);
    }
  });

  const sorted = [...groups].sort((a,b) => (stampsMap[b.id]||0) - (stampsMap[a.id]||0));
  const maxStamp = Math.max(...Object.values(stampsMap), 1);

  const lbHTML = sorted.length === 0 ? '<div class="empty">조를 먼저 등록해주세요.</div>' : sorted.map((g, i) => {
    const stamps = stampsMap[g.id] || 0;
    const done = completedMap[g.id] || new Set();
    const pct = Math.round((stamps / maxStamp) * 100);
    const rankClass = i === 0 ? 'r1 top1' : i === 1 ? 'r2 top2' : '';
    const rankLabel = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}`;
    const dots = missions.map((m, mi) =>
      `<div class="dot ${done.has(m.id) ? 'dot-done' : 'dot-empty'}" title="미션${mi+1}: ${m.name}">${mi+1}</div>`
    ).join('');
    return `<div class="lb-row ${rankClass}">
      <div class="lb-rank ${i===0?'r1':i===1?'r2':''}">${rankLabel}</div>
      <div class="lb-name">${g.name}</div>
      <div class="lb-dots">${dots}</div>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>
      <div class="lb-stamp">${stamps}스탬프</div>
    </div>`;
  }).join('');

  const matrixHTML = missions.map((m, mi) => {
    const cnt = groups.filter(g => completedMap[g.id]?.has(m.id)).length;
    const pct = groups.length ? Math.round((cnt / groups.length) * 100) : 0;
    return `<div class="matrix-row">
      <div class="matrix-label">미션${mi+1}: ${m.name}</div>
      <div class="matrix-bar-wrap"><div class="matrix-bar" style="width:${pct}%"></div></div>
      <div class="matrix-count">${cnt}/${groups.length}조</div>
    </div>`;
  }).join('');

  const mapHTML = buildStampMap(missions, groups, completedMap, stampsMap);

  el.innerHTML = `<div class="main-inner">
    <div class="metrics-grid">
      <div class="metric metric-accent"><div class="metric-val">${missions.length}</div><div class="metric-label">등록 미션</div></div>
      <div class="metric"><div class="metric-val">${groups.length}</div><div class="metric-label">참여 조</div></div>
      <div class="metric"><div class="metric-val">${submissions.length}</div><div class="metric-label">총 제출 수</div></div>
      <div class="metric"><div class="metric-val">${activeGroups}</div><div class="metric-label">활동 중인 조</div></div>
    </div>
    <div class="rank-cards">${sorted.map((g,i) => {
      const stamps = stampsMap[g.id]||0;
      const done = completedMap[g.id]||new Set();
      const emoji = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}위`;
      const dots = missions.map((m,mi) => `<div class="dot ${done.has(m.id)?'dot-done':'dot-empty'}" title="미션${mi+1}">${mi+1}</div>`).join('');
      return `<div class="rank-card ${i===0?'r1':''}">
        <div class="rank-badge">${emoji}</div>
        <div class="rank-info">
          <div class="rank-name">${g.name}</div>
          <div class="rank-stamp">${stamps}스탬프</div>
          <div class="rank-dots">${dots}</div>
        </div>
      </div>`;
    }).join('')}</div>
    <div class="stamp-map">
      <div class="stamp-map-title">🎲 스탬프 투어 맵 — 내 조는 어디쯤?</div>
      ${mapHTML}
    </div>
    <div class="card">
      <div class="card-title">📈 미션별 완료율</div>
      ${matrixHTML || '<div class="empty">등록된 미션이 없습니다.</div>'}
    </div>
  </div>`;
}

// ── 엑셀(CSV) 내보내기 ──
window.exportToCSV = function() {
  const { missions, groups, submissions } = window._exportData || {};
  if (!submissions || submissions.length === 0) { toast('내보낼 데이터가 없습니다.', 'error'); return; }

  const BOM = '\uFEFF'; // 한글 깨짐 방지
  const headers = ['조 이름', '미션 번호', '미션 이름', '활동 날짜', '후기', '사진 URL', '첨부파일 URL', '제출 일시'];

  const rows = submissions.map(s => {
    const m = missions.find(x => x.id === s.mission_id);
    const g = groups.find(x => x.id === s.group_id);
    const mi = missions.indexOf(m);
    const escape = v => `"${(v || '').toString().replace(/"/g, '""')}"`;
    return [
      escape(g?.name || ''),
      escape(`미션${mi >= 0 ? mi + 1 : '?'}`),
      escape(m?.name || '삭제된 미션'),
      escape(s.activity_date || ''),
      escape(s.review || ''),
      escape(s.image_url || ''),
      escape(s.doc_url || ''),
      escape(s.submitted_at ? new Date(s.submitted_at).toLocaleString('ko-KR') : ''),
    ].join(',');
  });

  const csvContent = BOM + [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `웰메이트_제출현황_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('엑셀 파일 다운로드 완료!');
};

// ── RENDER MEMBER DASHBOARD ──
async function renderMemberDashboard() {
  const el = document.getElementById('page-m-dashboard');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  const [missions, groups, submissions] = await Promise.all([getMissions(), getGroups(), getSubmissions()]);

  const stampsMap = {};
  const completedMap = {};
  groups.forEach(g => { stampsMap[g.id] = 0; completedMap[g.id] = new Set(); });
  submissions.forEach(s => {
    if (!completedMap[s.group_id]?.has(s.mission_id)) {
      completedMap[s.group_id]?.add(s.mission_id);
      const m = missions.find(x => x.id === s.mission_id);
      stampsMap[s.group_id] = (stampsMap[s.group_id] || 0) + (m?.stamp || 1);
    }
  });

  const sorted = [...groups].sort((a,b) => (stampsMap[b.id]||0) - (stampsMap[a.id]||0));
  const maxStamp = Math.max(...Object.values(stampsMap), 1);

  const lbHTML = sorted.length === 0 ? '<div class="empty">조가 등록되지 않았습니다.</div>' : sorted.map((g, i) => {
    const stamps = stampsMap[g.id] || 0;
    const done = completedMap[g.id] || new Set();
    const pct = Math.round((stamps / maxStamp) * 100);
    const rankLabel = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}`;
    const rankClass = i === 0 ? 'r1 top1' : i === 1 ? 'r2 top2' : '';
    const dots = missions.map((m, mi) =>
      `<div class="dot ${done.has(m.id) ? 'dot-done' : 'dot-empty'}" title="미션${mi+1}: ${m.name}">${mi+1}</div>`
    ).join('');
    return `<div class="lb-row ${rankClass}">
      <div class="lb-rank ${i===0?'r1':i===1?'r2':''}">${rankLabel}</div>
      <div class="lb-name">${g.name}</div>
      <div class="lb-dots">${dots}</div>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>
      <div class="lb-stamp">${stamps}스탬프</div>
    </div>`;
  }).join('');

  const mapHTML2 = buildStampMap(missions, groups, completedMap, stampsMap);

  el.innerHTML = `<div class="main-inner">
    <div style="background:linear-gradient(135deg,#1A1A1A,#3A3A3A);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px;color:white">
      <div style="font-size:12px;opacity:.6;margin-bottom:4px;letter-spacing:0.5px;text-transform:uppercase">2026 KAON 웰메이트 프로그램</div>
      <div style="font-size:20px;font-weight:700">동기들과 함께 성장하고 있어요 🚀</div>
      <div style="font-size:12px;opacity:.5;margin-top:6px">미션을 완료할수록 스탬프가 쌓여요</div>
    </div>
    <div class="rank-cards">${sorted.map((g,i) => {
      const stamps = stampsMap[g.id]||0;
      const done = completedMap[g.id]||new Set();
      const emoji = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}위`;
      const dots = missions.map((m,mi) => `<div class="dot ${done.has(m.id)?'dot-done':'dot-empty'}" title="미션${mi+1}">${mi+1}</div>`).join('');
      return `<div class="rank-card ${i===0?'r1':''}">
        <div class="rank-badge">${emoji}</div>
        <div class="rank-info">
          <div class="rank-name">${g.name}</div>
          <div class="rank-stamp">${stamps}스탬프</div>
          <div class="rank-dots">${dots}</div>
        </div>
      </div>`;
    }).join('')}</div>
    <div class="stamp-map">
      <div class="stamp-map-title">🎲 스탬프 투어 맵 — 내 조는 어디쯤?</div>
      ${mapHTML2}
    </div>
  </div>`;
}

window.refreshSubmitForm = function() {
  const groupId = document.getElementById('my-group-sel').value;
  const missions = window._missions || [];
  const submissions = window._submissions || [];
  if (!groupId) { document.getElementById('submit-mission-list').innerHTML = ''; return; }

  // 반려된 미션은 재제출 가능하도록 제외
  const completedIds = new Set(
    submissions.filter(s => s.group_id === groupId && (s.status || 'pending') !== 'rejected').map(s => s.mission_id)
  );
  const today = new Date(); today.setHours(0,0,0,0);

  const listHTML = missions.map((m, i) => {
    const done = completedIds.has(m.id);

    // 마감일 계산
    let deadlineBadge = '';
    if (m.end_date) {
      const end = new Date(m.end_date); end.setHours(0,0,0,0);
      const diff = Math.round((end - today) / (1000 * 60 * 60 * 24));
      if (diff < 0) {
        deadlineBadge = `<span style="font-size:10px;font-weight:600;color:#DC2626;background:#FEF2F2;padding:2px 7px;border-radius:20px;margin-left:4px">마감 ${Math.abs(diff)}일 초과</span>`;
      } else if (diff === 0) {
        deadlineBadge = `<span style="font-size:10px;font-weight:600;color:#D97706;background:#FFFBEB;padding:2px 7px;border-radius:20px;margin-left:4px">오늘 마감!</span>`;
      } else if (diff <= 3) {
        deadlineBadge = `<span style="font-size:10px;font-weight:600;color:#D97706;background:#FFFBEB;padding:2px 7px;border-radius:20px;margin-left:4px">D-${diff}</span>`;
      }
    }

    // 반려 여부 확인
    const rejectedSub = submissions.filter(s => s.group_id === groupId && s.mission_id === m.id)
                                   .find(s => (s.status || 'pending') === 'rejected');
    const isRejected = !!rejectedSub;
    const cardClass = done ? 'done' : isRejected ? '' : '';
    const cardStyle = isRejected ? 'border-left:4px solid #DC2626;background:#FFF8F8;' : '';

    return `<div class="ms-card ${cardClass}" id="msc-${m.id}" style="${cardStyle}" onclick="${isRejected || !done ? `selectMissionToSubmit('${m.id}','${m.name}')` : ''}">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div class="mission-num" style="${isRejected ? 'background:#FEF2F2;color:#DC2626;' : ''}">${i+1}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;display:flex;align-items:center;flex-wrap:wrap;gap:4px">
            ${m.name}
            ${isRejected ? '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:#FEF2F2;color:#DC2626">✕ 반려</span>' : ''}
            ${done && !isRejected ? '<span class="badge badge-green" style="font-size:10px">✓ 완료</span>' : ''}
            ${!done && !isRejected ? deadlineBadge : ''}
          </div>
          <div style="font-size:11px;color:var(--gray-400);margin-top:2px">${m.week||''} · ${m.stamp||1}스탬프${m.end_date ? ' · 마감 '+m.end_date : ''}${m.description?' · '+m.description:''}</div>
          ${isRejected && rejectedSub?.reject_reason ? `
            <div style="margin-top:8px;background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:8px 12px;">
              <div style="font-size:11px;font-weight:700;color:#DC2626;margin-bottom:3px">반려 사유</div>
              <div style="font-size:12px;color:#DC2626;">${rejectedSub.reject_reason}</div>
            </div>
            <div style="margin-top:8px;padding:8px 12px;background:var(--gray-50);border-radius:6px;border:1px solid var(--gray-200);">
              <div style="font-size:11px;font-weight:700;color:var(--gray-500);margin-bottom:3px">기존 제출 내용</div>
              <div style="font-size:12px;color:var(--gray-600);">${rejectedSub.review || '후기 없음'}</div>
              ${rejectedSub.image_url ? `<a href="${rejectedSub.image_url}" target="_blank" style="font-size:11px;color:var(--primary);text-decoration:none;font-weight:500;display:inline-block;margin-top:4px">🖼️ 사진 보기</a>` : ''}
              ${rejectedSub.doc_url ? `<a href="${rejectedSub.doc_url}" target="_blank" style="font-size:11px;color:var(--blue);text-decoration:none;font-weight:500;display:inline-block;margin-top:4px;margin-left:8px">📎 첨부파일 보기</a>` : ''}
            </div>
            <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="event.stopPropagation();selectMissionToSubmit('${m.id}','${m.name}')">✏️ 수정하여 재제출</button>
          ` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('submit-mission-list').innerHTML = listHTML || '<div class="empty">등록된 미션이 없습니다.</div>';
  document.getElementById('submit-form-card').style.display = 'none';

  const doneSubs = submissions.filter(s => s.group_id === groupId);
  if (doneSubs.length > 0) {
    document.getElementById('completed-card').style.display = '';
    document.getElementById('completed-list').innerHTML = doneSubs.map(s => {
      const m = missions.find(x => x.id === s.mission_id);
      const mi = missions.indexOf(m);
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-200)">
        ${s.image_url ? `<img style="width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--gray-200)" src="${s.image_url}">` : ''}
        <div>
          <div style="font-size:13px;font-weight:500">미션${mi>=0?mi+1:'?'}: ${m?.name||'삭제됨'}</div>
          <div style="font-size:12px;color:var(--gray-400)">${s.activity_date||''} · ${s.review||'후기없음'}</div>
        </div>
      </div>`;
    }).join('');
  } else {
    document.getElementById('completed-card').style.display = 'none';
  }
};

window.selectMissionToSubmit = function(id, name) {
  document.querySelectorAll('.ms-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('msc-' + id);
  if (card) card.classList.add('selected');
  document.getElementById('sf-mission-id').value = id;
  document.getElementById('sf-title').textContent = '미션 제출: ' + name;
  document.getElementById('submit-form-card').style.display = '';

  // 반려된 경우 기존 내용 자동 채우기
  const groupId = document.getElementById('my-group-sel').value;
  const rejectedSub = (window._submissions || []).find(s =>
    s.group_id === groupId && s.mission_id === id && (s.status || 'pending') === 'rejected'
  );
  if (rejectedSub) {
    document.getElementById('sf-review').value = rejectedSub.review || '';
    updateReviewCounter();
    document.getElementById('submit-form-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    document.getElementById('sf-review').value = '';
    updateReviewCounter();
  }
};

// 사진 선택 핸들러
window.handleImgSelect = function(input) {
  const file = input.files[0];
  if (!file) return;
  const area = document.getElementById('img-upload-area');
  const text = document.getElementById('img-upload-text');
  const preview = document.getElementById('sf-img-preview');
  const sizeTxt = file.size > 1024*1024 ? `${(file.size/1024/1024).toFixed(1)}MB` : `${(file.size/1024).toFixed(0)}KB`;
  text.innerHTML = `<span style="color:var(--green);font-weight:600">✓ ${file.name}</span><br><span style="color:var(--gray-400)">${sizeTxt}</span>`;
  area.classList.add('file-attached');
  const reader = new FileReader();
  reader.onload = e => { preview.src = e.target.result; preview.style.display = ''; };
  reader.readAsDataURL(file);
};

// 문서 선택 핸들러
window.handleDocSelect = function(input) {
  const file = input.files[0];
  if (!file) return;
  const area = document.getElementById('doc-upload-area');
  const text = document.getElementById('doc-upload-text');
  const sizeTxt = file.size > 1024*1024 ? `${(file.size/1024/1024).toFixed(1)}MB` : `${(file.size/1024).toFixed(0)}KB`;
  text.innerHTML = `<span style="color:var(--green);font-weight:600">✓ ${file.name}</span><br><span style="color:var(--gray-400)">${sizeTxt}</span>`;
  area.classList.add('file-attached');
};

// 후기 글자수 카운터
window.updateReviewCounter = function() {
  const val = document.getElementById('sf-review').value;
  const len = val.length;
  const counter = document.getElementById('review-counter');
  const hint = document.getElementById('review-hint');
  counter.textContent = `${len} / 30`;
  if (len >= 30) {
    counter.style.color = 'var(--green)';
    hint.style.display = 'none';
  } else {
    counter.style.color = len >= 20 ? 'var(--primary)' : 'var(--gray-400)';
    hint.style.display = '';
    hint.textContent = `${30 - len}자 더 작성해주세요.`;
  }
};

// ── CRUD ──
window.addMission = async function() {
  const name = document.getElementById('m-name').value.trim();
  const week = document.getElementById('m-week').value.trim();
  const desc = document.getElementById('m-desc').value.trim();
  const stamp = parseInt(document.getElementById('m-stamp').value) || 1;
  const start = document.getElementById('m-start').value || null;
  const end = document.getElementById('m-end').value || null;
  if (!name) { toast('미션 이름을 입력하세요.', 'error'); return; }
  const { error } = await sb.from('missions').insert({ name, week, description: desc, stamp, start_date: start, end_date: end });
  if (error) { toast('오류: ' + error.message, 'error'); return; }
  toast(`미션 "${name}" 추가 완료!`);
  renderMissions();
};


// ── 미션 수정 ──
window.startEditMission = function(id) {
  document.getElementById('mb-view-'+id).style.display = 'none';
  document.getElementById('mb-edit-'+id).style.display = '';
  document.getElementById('edit-btn-'+id).style.display = 'none';
};

window.cancelEditMission = function(id) {
  document.getElementById('mb-view-'+id).style.display = '';
  document.getElementById('mb-edit-'+id).style.display = 'none';
  document.getElementById('edit-btn-'+id).style.display = '';
};

window.saveMission = async function(id) {
  const name  = document.getElementById('edit-name-'+id).value.trim();
  const week  = document.getElementById('edit-week-'+id).value.trim();
  const desc  = document.getElementById('edit-desc-'+id).value.trim();
  const stamp = parseInt(document.getElementById('edit-stamp-'+id).value) || 1;
  const start = document.getElementById('edit-start-'+id).value || null;
  const end   = document.getElementById('edit-end-'+id).value || null;
  if (!name) { toast('미션 이름을 입력하세요.', 'error'); return; }
  const { error } = await sb.from('missions').update({
    name, week, description: desc, stamp, start_date: start, end_date: end
  }).eq('id', id);
  if (error) { toast('수정 실패: ' + error.message, 'error'); return; }
  toast('미션이 수정되었습니다.');
  renderMissions();
};

window.deleteMission = async function(id) {
  if (!confirm('이 미션을 삭제하시겠습니까?')) return;
  await sb.from('submissions').delete().eq('mission_id', id);
  await sb.from('missions').delete().eq('id', id);
  toast('미션이 삭제되었습니다.');
  renderMissions();
};

window.addGroup = async function() {
  const name = document.getElementById('g-name').value.trim();
  if (!name) { toast('조 이름을 입력하세요.', 'error'); return; }
  const { error } = await sb.from('groups').insert({ name });
  if (error) { toast(error.message.includes('unique') ? '이미 존재하는 조 이름입니다.' : error.message, 'error'); return; }
  document.getElementById('g-name').value = '';
  toast(`"${name}" 추가 완료!`);
  renderGroups();
};

window.deleteGroup = async function(id) {
  const group = (window._exportData?.groups || []).find(g => g.id === id);
  const subCount = (window._exportData?.submissions || []).filter(s => s.group_id === id).length;
  const groupName = group?.name || '이 조';
  const warning = subCount > 0
    ? `"${groupName}"을 삭제하시겠습니까?\n\n⚠️ 이 조의 미션 제출 데이터 ${subCount}건도 함께 삭제됩니다.\n삭제 후에는 복구할 수 없습니다.`
    : `"${groupName}"을 삭제하시겠습니까?`;
  if (!confirm(warning)) return;
  await sb.from('submissions').delete().eq('group_id', id);
  await sb.from('groups').delete().eq('id', id);
  toast(`"${groupName}"이 삭제되었습니다.`);
  renderGroups();
  renderDashboard(true);
};


// ── 승인 / 반려 ──
window.approveSubmission = async function(id) {
  const { error } = await sb.from('submissions').update({ status: 'approved', reject_reason: null }).eq('id', id);
  if (error) { toast('오류: ' + error.message, 'error'); return; }
  toast('미션이 승인되었습니다.');
  renderSubmissions();
};

let _rejectTargetId = null;
window.openRejectModal = function(id) {
  _rejectTargetId = id;
  document.getElementById('reject-modal-wrap').style.display = '';
  document.getElementById('reject-reason-input').value = '';
  document.getElementById('reject-reason-input').focus();
};
window.closeRejectModal = function() {
  document.getElementById('reject-modal-wrap').style.display = 'none';
  _rejectTargetId = null;
};
window.confirmReject = async function() {
  const reason = document.getElementById('reject-reason-input').value.trim();
  if (!reason) { toast('반려 사유를 입력해주세요.', 'error'); return; }
  const { error } = await sb.from('submissions').update({ status: 'rejected', reject_reason: reason }).eq('id', _rejectTargetId);
  if (error) { toast('오류: ' + error.message, 'error'); return; }
  closeRejectModal();
  toast('반려 처리되었습니다.');
  renderSubmissions();
};

window.deleteSubmission = async function(id) {
  if (!confirm('이 제출을 삭제하시겠습니까?')) return;
  await sb.from('submissions').delete().eq('id', id);
  toast('제출이 삭제되었습니다.');
  renderSubmissions();
};

window.submitMission = async function() {
  const groupId = document.getElementById('my-group-sel').value;
  const missionId = document.getElementById('sf-mission-id').value;
  const date = document.getElementById('sf-date').value;
  const review = document.getElementById('sf-review').value.trim();
  if (!groupId) { toast('조를 선택하세요.', 'error'); return; }
  if (!missionId) { toast('미션을 선택하세요.', 'error'); return; }
  if (!date) { toast('활동 날짜를 입력하세요.', 'error'); return; }

  const existing = (window._submissions || []).find(s => s.group_id === groupId && s.mission_id === missionId);
  if (existing) {
    if ((existing.status || 'pending') === 'rejected') {
      // 반려된 경우 기존 제출 삭제 후 재제출
      await sb.from('submissions').delete().eq('id', existing.id);
    } else {
      toast('이미 제출된 미션입니다.', 'error'); return;
    }
  }

  // 후기 100자 검증
  if (review.length < 30) {
    toast(`활동 후기를 ${30 - review.length}자 더 작성해주세요. (현재 ${review.length}자)`, 'error');
    document.getElementById('sf-review').focus();
    return;
  }

  // ── 마감일 경고 체크 ──
  const mission = (window._missions || []).find(m => m.id === missionId);
  if (mission?.end_date) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const endDate = new Date(mission.end_date);
    endDate.setHours(0, 0, 0, 0);
    if (today > endDate) {
      const daysOver = Math.round((today - endDate) / (1000 * 60 * 60 * 24));
      const proceed = confirm(`⚠️ 마감일(${mission.end_date})이 ${daysOver}일 지났어요.\n그래도 제출하시겠습니까?`);
      if (!proceed) return;
    }
  }

  let imageUrl = null;
  const imgInput = document.getElementById('sf-img');
  if (imgInput.files && imgInput.files[0]) {
    const file = imgInput.files[0];
    const ext = file.name.split('.').pop();
    const path = `img/${groupId}/${missionId}-${Date.now()}.${ext}`;
    const { data: upData, error: upErr } = await sb.storage.from('mission-images').upload(path, file, { contentType: file.type });
    if (upErr) {
      toast('사진 업로드 실패: ' + upErr.message, 'error');
      return;
    }
    if (upData) {
      const { data: urlData } = sb.storage.from('mission-images').getPublicUrl(path);
      imageUrl = urlData?.publicUrl || null;
    }
  }

  // 문서 파일 업로드
  let docUrl = null;
  const docInput = document.getElementById('sf-doc');
  if (docInput.files && docInput.files[0]) {
    const file = docInput.files[0];
    const ext = file.name.split('.').pop();
    const path = `doc/${groupId}/${missionId}-${Date.now()}.${ext}`;
    const { data: upData, error: upErr } = await sb.storage.from('mission-images').upload(path, file, { contentType: file.type });
    if (upErr) {
      toast('파일 업로드 실패: ' + upErr.message, 'error');
      return;
    }
    if (upData) {
      const { data: urlData } = sb.storage.from('mission-images').getPublicUrl(path);
      docUrl = urlData?.publicUrl || null;
    }
  }

  const { error } = await sb.from('submissions').insert({ group_id: groupId, mission_id: missionId, activity_date: date, review, image_url: imageUrl, doc_url: docUrl });
  if (error) { toast('오류: ' + error.message, 'error'); return; }

  toast('미션 제출 완료! 스탬프를 획득했어요 🎉');
  document.getElementById('sf-date').value = '';
  document.getElementById('sf-review').value = '';
  document.getElementById('sf-img').value = '';
  document.getElementById('sf-img-preview').style.display = 'none';
  document.getElementById('sf-doc').value = '';
  const imgArea = document.getElementById('img-upload-area');
  const imgText = document.getElementById('img-upload-text');
  const docArea = document.getElementById('doc-upload-area');
  const docText = document.getElementById('doc-upload-text');
  if (imgArea) imgArea.classList.remove('file-attached');
  if (imgText) imgText.innerHTML = '<span>사진 선택</span><br>JPG, PNG, GIF 등 이미지';
  if (docArea) docArea.classList.remove('file-attached');
  if (docText) docText.innerHTML = '<span>파일 선택</span><br>PDF, DOCX, XLSX, PPT 등';
  document.getElementById('sf-review').value = '';
  const counter = document.getElementById('review-counter');
  const hint = document.getElementById('review-hint');
  if (counter) { counter.textContent = '0 / 30'; counter.style.color = 'var(--gray-400)'; }
  if (hint) { hint.style.display = ''; hint.textContent = '아직 30자가 되지 않았어요.'; }
  document.getElementById('submit-form-card').style.display = 'none';
  await renderMemberSubmit();
  window.refreshSubmitForm();
};

// ── ROUTER ──
function renderPage(page) {
  if (page === 'dashboard') renderDashboard();
  else if (page === 'missions') renderMissions();
  else if (page === 'groups') renderGroups();
  else if (page === 'submissions') renderSubmissions();
}

function renderMemberPage(page) {
  if (page === 'm-dashboard') renderMemberDashboard();
  else if (page === 'm-submit') renderMemberSubmit();
}

// ── INIT ──
detectMode();
</script>
